<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Progress Tracking</title>
        <link rel="stylesheet" href="../css/dashboard.css">
    </head>
    <body>
        <div class="container">
            <!--SIDEBAR-->
            <aside class="sidebar">
                <h2>🏋️ Elevate X</h2>
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href=" " class="active">Progress</a></li>
                    <li><a href="articles.html">Articles</a></li>
                    <li><a href="profile.html">Profile Management</a></li>
                    <li class="logout-item" onclick="logout()">Logout</li>
                </ul>
            </aside>
            
            <!--MAIN CONTENT-->
            <main class="main">
                <h1>Progress Tracking</h1>

                <form id="progressForm">
                    <label>Date: </label>
                    <input type="date" id="date" required /><br><br>

                    <label>Workout type: </label>
                    <input type="text" id="workoutType" placeholder="Running, Gymnastics, etc..." required /><br><br>
                    
                    <label>Calories Burned: </label>
                    <input type="Number" id="caloriesBurned" placeholder="Amount of calories burned after workout" required /><br><br>
                    
                    <label>Current Weight: </label>
                    <input type="Number" id="weight" placeholder="What's your current weight?" required /><br><br>
                    
                    <label>Duration: </label>
                    <input type="number" id="duration" placeholder="Duration (minutes)" required /><br><br>
                    
                    <button type="submit">Add Progress</button>
                </form>

                <h2 style="text-align: center;">Past Progresses</h2>
                <table>
                    <thead>
                        <tr>
                        <th>Date</th>
                        <th>Workout Type</th>
                        <th>Calories Burned</th>
                        <th>Current Weight (KG)</th>
                        <th>Duration (min)</th>
                        </tr>
                    </thead>
                    <tbody id="progressTableBody">
                        <!--Progress entries will be shown here-->
                    </tbody>
                </table>
            </main>
        </div>
    </body>
    <script src="../js/progress.js"></script>
</html>
