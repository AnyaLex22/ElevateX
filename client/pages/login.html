<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="../css/auth.css">
    </head>
    <body>

        <div class="auth-container">
            <h2>Welcome Back 👋</h2>
            <p style="color:#64748b;font-size:0.85rem;margin-bottom:12px;">Log in to continue your journey.</p>
 
            <input type="email" id="email" placeholder="email@gmail.com" autocomplete="email"><br>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"><br>
 
            <button id="loginBtn" onclick="login()">Login</button>
 
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
 
        <div class="toast" id="toast"></div>

        <script src="../js/auth.js"></script>
    </body>
</html>
